name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # <-- Cette ligne est INDISPENSABLE pour débloquer l'erreur

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download Solar2D Builder CLI
      run: |
        curl -L -o solar2d-cli.tar.gz https://github.com/coronalabs/corona/releases/download/3712/Solar2D-Linux-3712.tar.gz
        tar -xzf solar2d-cli.tar.gz
        chmod +x ./Solar2D-Builder

    - name: Build APK via Solar2D
      run: |
        mkdir -p builds
        ./Solar2D-Builder build recipe.lua

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CCode-Lite-APK
        path: builds/CCode-Lite.apk
        
