name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download and Setup Solar2D Latest Release
      run: |
        # 1. Requête authentifiée auprès de l'API GitHub pour obtenir toutes les releases
        RELEASES_JSON=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/coronalabs/corona/releases)
        
        # 2. Extraction du premier lien qui contient "Linux" et termine par ".tar.gz"
        LATEST_URL=$(echo "$RELEASES_JSON" | jq -r '.[].assets[]? | select(.name | test("Linux"; "i")) | select(.name | test("tar.gz$")) | .browser_download_url' | head -n 1)
        
        echo "Téléchargement depuis : $LATEST_URL"
        
        # Sécurité : si aucune URL n'est trouvée, on stoppe proprement avec un message clair
        if [ -z "$LATEST_URL" ] || [ "$LATEST_URL" = "null" ]; then
          echo "Erreur : Impossible de trouver un binaire Linux dans les releases Solar2D."
          exit 1
        fi
        
        # 3. Téléchargement et extraction
        wget "$LATEST_URL" -O solar2d.tar.gz
        
        mkdir -p solar2d-cli
        tar -xzf solar2d.tar.gz -C solar2d-cli --strip-components=1
        
        # 4. Permissions sur le binaire
        chmod +x ./solar2d-cli/resources/Solar2D-Builder

    - name: Build APK via Solar2D
      run: |
        mkdir -p builds
        ./solar2d-cli/resources/Solar2D-Builder build recipe.lua

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CCode-Lite-APK
        path: builds/CCode-Lite.apk
        
