name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download and Setup Solar2D Latest Release
      run: |
        # 1. On récupère automatiquement l'URL du dernier fichier .tar.gz de Solar2D Linux
        LATEST_URL=$(curl -s https://api.github.com/repos/coronalabs/corona/releases/latest | grep "browser_download_url.*Linux.*tar.gz" | cut -d '"' -f 4)
        
        echo "Téléchargement depuis : $LATEST_URL"
        
        # 2. On télécharge le fichier
        wget "$LATEST_URL" -O solar2d.tar.gz
        
        # 3. Extraction de l'archive
        mkdir solar2d-cli
        tar -xzf solar2d.tar.gz -C solar2d-cli --strip-components=1
        
        # 4. On donne les droits au Builder
        chmod +x ./solar2d-cli/resources/Solar2D-Builder

    - name: Build APK via Solar2D
      run: |
        mkdir -p builds
        ./solar2d-cli/resources/Solar2D-Builder build recipe.lua

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CCode-Lite-APK
        path: builds/CCode-Lite.apk
        
